<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>System Boot</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #0a0a0a;
      color: white;

      font-family: 'Orbitron', sans-serif;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .title {
      font-size: 18px;
      letter-spacing: 2px;
    }

    .start-btn {
      background: #fff;
      color: #ff003c;

      border: 3px solid #ff003c;

      padding: 14px 20px;

      font-weight: 700;
      cursor: pointer;

      box-shadow: 4px 4px 0px #000;
      transition: 0.15s;
    }

    .start-btn:active {
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0px #000;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title">SYSTEM ONLINE</div>

    <button class="start-btn" onclick="start()">START</button>
  </div>

  <script>
    function start() {
      window.location.href = "chat.html";
    }
  </script>

</body>
</html>
